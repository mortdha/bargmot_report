#cover-designer-modal .color-swatch:hover{transform:scale(1.15);}</style><script>document.addEventListener('DOMContentLoaded', () => {

/* --- بداية التعديل: الثوابت العامة للتحكم في السلوك والأداء --- */
const MAX_UNDO = 100;              // الحد الأقصى لعدد حالات التراجع
const EXPORT_SCALE = 8;             // مقياس التصيير في html2canvas (كان ثابتاً سابقاً 8)
const SAVE_THROTTLE_MS = 350;       // المهلة الزمنية لتجميع عمليات الحفظ
/* --- نهاية التعديل: الثوابت العامة --- */

/* --- بداية التعديل: أعلام وأدوات مساعدة عامة (Throttle / Safe Exec / Sanitizer) --- */
let isExportingPdf = false;
let isCoverSaving = false;

/* Throttle بسيط */
function throttle(fn, delay){
    let lastCall = 0, timer = null, lastArgs;
    return function throttled(...args){
        lastArgs = args;
        const now = Date.now();
        const remaining = delay - (now - lastCall);
        if (remaining <= 0){
            lastCall = now;
            fn.apply(this, lastArgs);
            lastArgs = null;
        } else if (!timer){
            timer = setTimeout(() => {
                lastCall = Date.now();
                fn.apply(this, lastArgs);
                lastArgs = null;
                timer = null;
            }, remaining);
        }
    };
